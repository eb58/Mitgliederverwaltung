<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vereinsverwaltung</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ag-grid-community/dist/ag-grid-community.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="./dummyMembers.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        .main-container {
            margin: 20px auto;
            max-width: 1400px;
        }

        .header-gradient {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px 12px 0 0;
        }

        .nav-tabs {
            background: rgba(0, 0, 0, 0.2);
            border: none;
            padding: 0 10px;
        }

        .nav-tabs .nav-link {
            color: rgba(255, 255, 255, 0.8) !important;
            border: none;
            padding: 12px 20px;
        }

        .nav-tabs .nav-link.active {
            background: white !important;
            color: #764ba2 !important;
            font-weight: bold;
            border-radius: 8px 8px 0 0;
        }

        .tab-content {
            background: white;
            border-radius: 0 0 12px 12px;
            min-height: 600px;
        }

        #membersGrid, #paymentsGrid {
            height: 500px;
            width: 100%;
        }

        .chart-wrapper {
            position: relative;
            height: 250px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
        }
    </style>
</head>
<body>

<div class="main-container shadow-lg">
    <div class="card border-0">
        <div class="card-header header-gradient text-white text-center py-4">
            <h1 class="mb-1"><i class="bi bi-person-gear"></i> Vereinsverwaltung</h1>
            <p class="mb-0 opacity-75">Mitglieder, Beiträge & Analysen</p>
        </div>

        <ul class="nav nav-tabs nav-fill" id="mainTabs">
            <li class="nav-item">
                <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#dashboard">Dashboard</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#members">Mitglieder</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#payments">Beiträge</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#reports">Berichte</button>
            </li>
        </ul>

        <div class="tab-content p-4">
            <div class="tab-pane fade show active" id="dashboard">
                <div class="row g-4 mb-4" id="statsRow"></div>
            </div>

            <div class="tab-pane fade" id="members">
                <div class="d-flex justify-content-between mb-3">
                    <div class="d-flex gap-2">
                        <button class="btn btn-success px-4" onclick="openMemberModal()">
                            <i class="bi bi-plus-lg"></i> Neu anlegen
                        </button>
                        <button class="btn btn-outline-danger" onclick="resetGridState()">
                            <i class="bi bi-arrow-clockwise"></i> Ansicht Reset
                        </button>
                    </div>
                    <input type="text" class="form-control w-25 shadow-sm" id="memberSearch" placeholder="Suche...">
                </div>
                <div id="membersGrid" class="ag-theme-quartz"></div>
            </div>

            <div class="tab-pane fade" id="payments">
                <div class="d-flex justify-content-between mb-3 align-items-center">
                    <h5 class="mb-0">Zahlungsübersicht</h5>
                    <button class="btn btn-primary btn-sm" onclick="paymentApi.exportDataAsCsv()"><i class="bi bi-download"></i>
                        CSV Export
                    </button>
                </div>
                <div id="paymentsGrid" class="ag-theme-quartz"></div>
            </div>

            <div class="tab-pane fade" id="reports">
                <div class="row g-4 text-center">
                    <div class="col-md-4">
                        <div class="card p-3 shadow-sm"><h6>Sparten</h6>
                            <div class="chart-wrapper">
                                <canvas id="chartCats"></canvas>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card p-3 shadow-sm"><h6>Alter</h6>
                            <div class="chart-wrapper">
                                <canvas id="chartAges"></canvas>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card p-3 shadow-sm"><h6>Zahlungsstatus</h6>
                            <div class="chart-wrapper">
                                <canvas id="chartFin"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="memberModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header header-gradient text-white">
                <h5 class="modal-title" id="modalTitle">Mitgliedsdaten</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="memberForm">
                    <input type="hidden" id="editId">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="fName" class="form-label">Vorname</label>
                            <input type="text" id="fName" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label for="lName" class="form-label">Nachname</label>
                            <input type="text" id="lName" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label for="birthDate" class="form-label">Geburtsdatum</label>
                            <input type="date" id="birthDate" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label for="joinDate" class="form-label">Beitrittsdatum</label>
                            <input type="date" id="joinDate" class="form-control" required>
                        </div>
                        <div class="col-12">
                            <label for="mEmail" class="form-label">E-Mail</label>
                            <input type="email" id="mEmail" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label for="mStatus" class="form-label">Status</label>
                            <select id="mStatus" class="form-select">
                                <option value="aktiv">Aktiv</option>
                                <option value="passiv">Passiv</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="mCat" class="form-label">Kategorie</label>
                            <select id="mCat" class="form-select">
                                <option value="Vollmitglied">Vollmitglied</option>
                                <option value="Jugend">Jugend</option>
                                <option value="Ehrenmitglied">Ehrenmitglied</option>
                            </select>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Abbrechen</button>
                <button type="button" class="btn btn-primary" onclick="saveMember()">Speichern</button>
            </div>
        </div>
    </div>
</div>


<script>
    let members = [];
    let memberApi, paymentApi;
    let charts = {};
    const modal = new bootstrap.Modal(document.getElementById('memberModal'));
    const qs = (sel) => document.querySelector(sel);

    // Spaltendefinitionen
    const mCols = [
        {field: "memberNumber", headerName: "Nr.", width: 80, pinned: 'left'},
        {headerName: "Name", valueGetter: p => `${p.data.lastName}, ${p.data.firstName}`, minWidth: 200, pinned: 'left'},
        {field: "email", headerName: "E-Mail", minWidth: 200},
        {
            field: "status",
            headerName: "Status",
            width: 100,
            cellRenderer: p => `<span class="badge ${p.value === 'aktiv' ? 'bg-success' : 'bg-secondary'}">${p.value}</span>`
        },
        {
            headerName: "Aktion",
            width: 120,
            cellRenderer: p => `
                <div class="d-flex gap-2 mt-1">
                    <button class="btn btn-sm btn-outline-primary py-0" onclick="openMemberModal(${p.data.id})"><i class="bi bi-pencil"></i></button>
                    <button class="btn btn-sm btn-outline-danger py-0" onclick="deleteM(${p.data.id})"><i class="bi bi-trash"></i></button>
                </div>`
        }
    ];

    document.addEventListener('DOMContentLoaded', () => {
        const stored = localStorage.getItem('vereinsDataNative');
        members = stored ? JSON.parse(stored) : generateDummyData();

        memberApi = agGrid.createGrid(qs('#membersGrid'), {
            columnDefs: mCols, rowData: members, pagination: true,
            defaultColDef: {sortable: true, filter: true, resizable: true}
        });

        paymentApi = agGrid.createGrid(qs('#paymentsGrid'), {
            columnDefs: [
                {field: "memberNumber", headerName: "Nr.", width: 80},
                {headerName: "Mitglied", valueGetter: p => `${p.data.lastName}, ${p.data.firstName}`, minWidth: 200},
                {field: "annualFee", headerName: "Beitrag", valueFormatter: p => p.value + " €"},
                {
                    field: "paymentStatus", headerName: "Status", cellRenderer: p => {
                        const map = {'bezahlt': 'bg-success', 'ausstehend': 'bg-warning text-dark', 'überfällig': 'bg-danger'};
                        return `<span class="badge ${map[p.value] || 'bg-secondary'}">${p.value}</span>`;
                    }
                },
                {
                    headerName: "Aktion",
                    cellRenderer: p => `<button class="btn btn-sm btn-primary py-0" onclick="togglePay(${p.data.id})">Switch</button>`
                }
            ],
            rowData: members, pagination: true,
            defaultColDef: {sortable: true, filter: true, resizable: true}
        });

        document.querySelectorAll('button[data-bs-toggle="tab"]').forEach(btn => {
            btn.addEventListener('shown.bs.tab', (e) => {
                if (e.target.innerText === 'Berichte') renderReports();
                if (memberApi) memberApi.sizeColumnsToFit();
                if (paymentApi) paymentApi.sizeColumnsToFit();
            });
        });

        qs('#memberSearch').addEventListener('input', (e) => memberApi.setGridOption('quickFilterText', e.target.value));
        updateDashboard();
    });

    window.openMemberModal = (id = null) => {
        const form = qs('#memberForm');
        form.reset();
        if (id !== null) {
            const m = members.find(x => x.id === id);
            qs('#editId').value = m.id;
            qs('#fName').value = m.firstName;
            qs('#lName').value = m.lastName;
            qs('#birthDate').value = m.birthdate;
            qs('#joinDate').value = m.joinDate;
            qs('#mEmail').value = m.email;
            qs('#mStatus').value = m.status;
            qs('#mCat').value = m.category;
            qs('#modalTitle').innerText = "Mitglied bearbeiten";
        } else {
            qs('#editId').value = "";
            qs('#modalTitle').innerText = "Neues Mitglied anlegen";
        }
        modal.show();
    };

    window.saveMember = () => {
        const id = qs('#editId').value;
        const data = {
            firstName: qs('#fName').value,
            lastName: qs('#lName').value,
            email: qs('#mEmail').value,
            status: qs('#mStatus').value,
            category: qs('#mCat').value
        };

        if (id) {
            const idx = members.findIndex(m => m.id == id);
            members[idx] = {...members[idx], ...data};
        } else {
            const newId = members.length > 0 ? Math.max(...members.map(m => m.id)) + 1 : 1;
            members.push({
                id: newId, memberNumber: String(newId).padStart(4, '0'), ...data,
                birthdate: '1995-01-01', paymentStatus: 'ausstehend', annualFee: 60
            });
        }
        saveAndRefresh();
        modal.hide();
    };

    function deleteM(id) {
        if (confirm('Mitglied wirklich löschen?')) {
            members = members.filter(m => m.id !== id);
            saveAndRefresh();
        }
    }

    function togglePay(id) {
        const m = members.find(x => x.id === id);
        m.paymentStatus = m.paymentStatus === 'bezahlt' ? 'ausstehend' : 'bezahlt';
        saveAndRefresh();
    }

    function saveAndRefresh() {
        localStorage.setItem('vereinsDataNative', JSON.stringify(members));
        memberApi.setGridOption('rowData', members);
        paymentApi.setGridOption('rowData', members);
        updateDashboard();
    }

    function updateDashboard() {
        const active = members.filter(m => m.status === 'aktiv').length;
        qs('#statsRow').innerHTML = `
            <div class="col-md-4"><div class="card stat-card p-4 rounded-3"><h6>MITGLIEDER</h6><h2>${members.length}</h2></div></div>
            <div class="col-md-4"><div class="card stat-card p-4 rounded-3"><h6>AKTIV</h6><h2>${active}</h2></div></div>
            <div class="col-md-4"><div class="card stat-card p-4 rounded-3"><h6>OFFENE POSTEN</h6><h2>${members.filter(m => m.paymentStatus !== 'bezahlt').length}</h2></div></div>
        `;
    }

    function renderReports() {
        const cats = {};
        const ages = {'55-60': 0, '60-69': 0, '70-79': 0, '80+': 0};
        const fin = {'bezahlt': 0, 'offen': 0};
        members.forEach(m => {
            cats[m.category] = (cats[m.category] || 0) + 1;
            fin[m.paymentStatus === 'bezahlt' ? 'bezahlt' : 'offen']++;
            const age = new Date().getFullYear() - new Date(m.birthdate).getFullYear();
            if (age <= 60) ages['55-60']++; else if (age < 70) ages['60-69']++; else if (age < 80) ages['70-79']++; else ages['80+']++;
        });

        const init = (id, type, labels, data, colors) => {
            if (charts[id]) charts[id].destroy();
            charts[id] = new Chart(document.getElementById(id), {
                type, data: {labels, datasets: [{data, backgroundColor: colors}]},
                options: {responsive: true, maintainAspectRatio: false}
            });
        };
        init('chartCats', 'doughnut', Object.keys(cats), Object.values(cats), ['#667eea', '#764ba2', '#43e97b']);
        init('chartAges', 'doughnut', Object.keys(ages), Object.values(ages), ['#667eea', '#764ba2', '#43e97b', '#f6c23e']);
        init('chartFin', 'pie', ['Bezahlt', 'Offen'], [fin.bezahlt, fin.offen], ['#28a745', '#dc3545']);
    }

    window.resetGridState = () => {
        localStorage.clear();
        location.reload();
    };
</script>
</body>
</html>
