<!doctype html>
<html lang="de">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Senioren Lübars</title>
  <link rel="icon" type="image/png" href="assets/app-icon.png">
  <link rel="stylesheet" href="./node_modules/bootstrap/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="./node_modules/ag-grid-community/styles/ag-grid.css">
  <link rel="stylesheet" href="./node_modules/ag-grid-community/styles/ag-theme-quartz.css">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <main class="container-fluid py-3">
    <header class="app-header d-flex flex-wrap align-items-center justify-content-between gap-3 mb-3">
      <div class="app-header__brand">
        <img class="app-header__image" src="assets/website-logo.jpg" alt="Freizeitstätte Lübars">
      </div>
      <div class="d-flex flex-wrap align-items-center gap-2">
        <input id="globalSearchInput" type="search" class="form-control search-input"
          placeholder="Suchen (Name, E-Mail, Straße, ...)">
        <button id="addMemberBtn" class="btn btn-primary">Neues Mitglied</button>
      </div>
    </header>

    <ul class="nav nav-tabs" id="mainTabs" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link active" id="dashboard-tab" data-bs-toggle="tab" data-bs-target="#dashboard-pane"
          type="button" role="tab" aria-controls="dashboard-pane" aria-selected="true">Dashboard</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="overview-tab" data-bs-toggle="tab" data-bs-target="#overview-pane" type="button"
          role="tab" aria-controls="overview-pane" aria-selected="false">Übersicht</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="payments-tab" data-bs-toggle="tab" data-bs-target="#payments-pane" type="button"
          role="tab" aria-controls="payments-pane" aria-selected="false">Bezahlungsdaten</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="christmas-tab" data-bs-toggle="tab" data-bs-target="#christmas-pane" type="button"
          role="tab" aria-controls="christmas-pane" aria-selected="false">Weihnachtsessen</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="historical-tab" data-bs-toggle="tab" data-bs-target="#historical-pane"
          type="button" role="tab" aria-controls="historical-pane" aria-selected="false">Historisch</button>
      </li>
    </ul>

    <section class="tab-content pt-3">
      <div class="tab-pane fade show active" id="dashboard-pane" role="tabpanel" aria-labelledby="dashboard-tab"
        tabindex="0">

        <div class="row g-3 mb-3">
          <div class="col-sm-6 col-xl-3">
            <article class="metric-box">
              <div class="metric-label">Mitglieder</div>
              <div class="metric-value" id="metricTotal">0</div>
            </article>
          </div>
          <div class="col-sm-6 col-xl-3">
            <article class="metric-box">
              <div class="metric-label">Gäste</div>
              <div class="metric-value" id="metricGuestCount">0</div>
            </article>
          </div>
          <div class="col-sm-6 col-xl-3">
            <article class="metric-box">
              <div class="metric-label">Club bezahlt</div>
              <div class="metric-value" id="metricClubPaid">0</div>
            </article>
          </div>
          <div class="col-sm-6 col-xl-3">
            <article class="metric-box">
              <div class="metric-label">Club offen</div>
              <div class="metric-value" id="metricClubOpen">0</div>
            </article>
          </div>
        </div>

        <div class="row g-3 mb-3">
          <div class="col-sm-6 col-xl-3">
            <article class="metric-box">
              <div class="metric-label">Mitglieder in Computergruppen</div>
              <div class="metric-value" id="metricComputerTotal">0</div>
            </article>
          </div>
          <div class="col-sm-6 col-xl-3">
            <article class="metric-box">
              <div class="metric-label">Computergruppe Bezahlt</div>
              <div class="metric-value" id="metricComputerPaid">0</div>
            </article>
          </div>
          <div class="col-sm-6 col-xl-3">
            <article class="metric-box">
              <div class="metric-label">Computergruppe nicht bezahlt</div>
              <div class="metric-value" id="metricComputerOpen">0</div>
            </article>
          </div>
        </div>

        <div class="row g-3 mb-3">
          <div class="col-sm-6 col-xl-3">
            <article class="metric-box">
              <div class="metric-label">Männer</div>
              <div class="metric-value" id="metricMaleCount">0</div>
            </article>
          </div>
          <div class="col-sm-6 col-xl-3">
            <article class="metric-box">
              <div class="metric-label">Frauen</div>
              <div class="metric-value" id="metricFemaleCount">0</div>
            </article>
          </div>
          <div class="col-sm-6 col-xl-3">
            <article class="metric-box">
              <div class="metric-label">Durchschnittsalter</div>
              <div class="metric-value" id="metricAverageAge">0</div>
            </article>
          </div>
        </div>

        <div class="row g-3 mb-3">
          <div class="col-12">
            <div class="stat-panel birthday-panel">
              <div class="d-flex align-items-center justify-content-between mb-3 gap-2">
                <h2 class="h6 mb-0">Geburtstagskinder der Woche</h2>
                <span class="text-muted small">nächste 7 Tage</span>
              </div>
              <div id="birthdayList" class="birthday-list"></div>
            </div>
          </div>
        </div>

        <div class="row g-3 mb-3">
          <div class="col-lg-6">
            <div class="stat-panel age-panel">
              <div class="d-flex align-items-center justify-content-between mb-3 gap-2">
                <h2 class="h6 mb-0">Altersverteilung</h2>
                <span class="text-muted small">in Dekaden</span>
              </div>
              <div class="age-chart">
                <canvas id="ageChart"></canvas>
              </div>
            </div>
          </div>
          <div class="col-lg-6">
            <div class="stat-panel group-panel">
              <div class="d-flex align-items-center justify-content-between mb-3 gap-2">
                <h2 class="h6 mb-0">Interessengruppen</h2>
              </div>
              <div class="group-chart">
                <canvas id="groupChart"></canvas>
              </div>
            </div>
          </div>
        </div>

      </div>

      <div class="tab-pane fade" id="overview-pane" role="tabpanel" aria-labelledby="overview-tab" tabindex="0">
        <div class="grid-toolbar">
          <button id="toggleOverviewGuestsBtn" class="btn btn-outline-secondary guest-toggle" type="button"
            aria-pressed="true">Gäste ausblenden</button>
        </div>
        <div id="overviewGrid" class="ag-theme-quartz grid-host grid-host--with-toolbar"></div>
      </div>

      <div class="tab-pane fade" id="payments-pane" role="tabpanel" aria-labelledby="payments-tab" tabindex="0">
        <div class="grid-toolbar">
          <button id="togglePaymentGuestsBtn" class="btn btn-outline-secondary guest-toggle" type="button"
            aria-pressed="true">Gäste ausblenden</button>
          <button id="togglePaymentComputerGroupsBtn" class="btn btn-outline-secondary guest-toggle" type="button"
            aria-pressed="false">Nur Computergruppen</button>
        </div>
        <div id="paymentsGrid" class="ag-theme-quartz grid-host grid-host--with-toolbar"></div>
      </div>

      <div class="tab-pane fade" id="christmas-pane" role="tabpanel" aria-labelledby="christmas-tab" tabindex="0">
        <div class="grid-toolbar">
          <button id="toggleChristmasGuestsBtn" class="btn btn-outline-secondary guest-toggle" type="button"
            aria-pressed="true">Gäste ausblenden</button>
        </div>
        <div id="christmasGrid" class="ag-theme-quartz grid-host grid-host--with-toolbar"></div>
      </div>
      <div class="tab-pane fade" id="historical-pane" role="tabpanel" aria-labelledby="historical-tab" tabindex="0">
        <div class="grid-toolbar">
          <button id="toggleHistoricalGuestsBtn" class="btn btn-outline-secondary guest-toggle" type="button"
            aria-pressed="true">Gäste ausblenden</button>
        </div>
        <div id="historicalGrid" class="ag-theme-quartz grid-host grid-host--with-toolbar"></div>
      </div>
    </section>
  </main>

  <div class="modal fade" id="memberModal" tabindex="-1" aria-labelledby="memberModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
      <div class="modal-content">
        <form id="memberForm">
          <div class="modal-header">
            <h2 class="modal-title h5" id="memberModalLabel">Mitglied bearbeiten</h2>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Schließen"></button>
          </div>
          <div class="modal-body">
            <div id="formFields"></div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Abbrechen</button>
            <button type="submit" class="btn btn-primary">Speichern</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="./node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./node_modules/ag-grid-community/dist/ag-grid-community.min.js"></script>
  <script src="./node_modules/chart.js/dist/chart.umd.min.js"></script>
  <script type="module" src="app.js"></script>
</body>

</html>
